<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>চাকরির বাজার — বাংলাদেশের চাকরির নোটিশবোর্ড</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Noto+Sans+Bengali:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; }
  .job-card { transition: transform .18s ease, box-shadow .18s ease; }
  .job-card:hover { transform: rotate(0deg) translateY(-3px) !important; box-shadow: 0 10px 24px rgba(0,0,0,0.18); }
  .board-bg { background-image: radial-gradient(#2B241B0d 1px, transparent 1px); background-size: 14px 14px; }
  ::placeholder { color: #2B241B66; }
  .modal-scroll::-webkit-scrollbar { width: 6px; }
  .modal-scroll::-webkit-scrollbar-thumb { background: #2B241B33; border-radius: 3px; }
  .tab-scroll::-webkit-scrollbar { display: none; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ====== CONFIG ======
const SUPABASE_URL = "https://vljndttfbsxfskknaqhf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsam5kdHRmYnN4ZnNra25hcWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NjM1OTQsImV4cCI6MjA5OTQzOTU5NH0.O7b6hijQn7-y95q_BeyjbsHEAXG3Lf-MajCmL2Y8GVU";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ADMIN_PASSWORD = "Chakri2026Bazar";

const bnDigits = ["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
const toBn = (n) => String(n).replace(/[0-9]/g, (d) => bnDigits[d]);
const CATEGORIES = ["সরকারি","বেসরকারি","ব্যাংক ও আর্থিক প্রতিষ্ঠান","এনজিও","ভর্তি পরীক্ষা / ফলাফল","অন্যান্য"];
const MENU_TABS = [
  { id: "সব", label: "সব বিজ্ঞপ্তি", icon: "📋" },
  { id: "নতুন", label: "নতুন পোস্ট", icon: "🆕" },
  { id: "সরকারি", label: "সরকারি চাকরি", icon: "🏛️" },
  { id: "বেসরকারি", label: "বেসরকারি চাকরি", icon: "🏢" },
  { id: "ব্যাংক ও আর্থিক প্রতিষ্ঠান", label: "ব্যাংক", icon: "🏦" },
  { id: "এনজিও", label: "এনজিও", icon: "🤝" },
  { id: "ভর্তি পরীক্ষা / ফলাফল", label: "ভর্তি পরীক্ষা", icon: "🎓" },
  { id: "ডেট", label: "চাকরির ডেট", icon: "📅" },
  { id: "পুরাতন", label: "পুরাতন চাকরি", icon: "🗄️" },
];
const ROTATIONS = [-2.2, 1.4, -1, 2, 0.6, -1.8, 1.1];

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function genRefCode() {
  const n = Math.floor(1000 + Math.random() * 9000);
  return `স্মারক নং: JB-${toBn(n)}/২০২৬`;
}
function formatDateBn(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const months = ["জানু","ফেব্রু","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্ট","অক্টো","নভে","ডিসে"];
  return `${toBn(d.getDate())} ${months[d.getMonth()]}, ${toBn(d.getFullYear())}`;
}
function isExpired(deadline) {
  if (!deadline) return false;
  return new Date(deadline + "T23:59:59").getTime() < Date.now();
}
function daysLeft(deadline) {
  if (!deadline) return null;
  return Math.ceil((new Date(deadline + "T23:59:59") - Date.now()) / 86400000);
}

const paper = "#EFE7D2", ink = "#2B241B", green = "#0B4A38", greenDark = "#08362A", red = "#A93226", mustard = "#C99A2E";
const fontDisplay = { fontFamily: "'Tiro Bangla','Noto Serif Bengali',serif" };
const fontBody = { fontFamily: "'Noto Sans Bengali','Hind Siliguri',sans-serif" };
const fontMono = { fontFamily: "'JetBrains Mono','Courier New',monospace" };
const inputStyle = { ...fontBody, width: "100%", padding: "10px 12px", borderRadius: 6, border: `1.5px solid ${ink}33`, background: "#FBF8EF", color: ink, outline: "none" };

function Field({ label, children, required }) {
  return (
    <label className="block mb-4">
      <span className="block text-sm mb-1.5" style={{ ...fontBody, color: ink, opacity: 0.85 }}>
        {label}{required && <span style={{ color: red }}> *</span>}
      </span>
      {children}
    </label>
  );
}
function InfoRow({ label, value }) {
  if (!value) return null;
  return (<p className="text-sm mb-1.5"><span className="font-semibold">{label}:</span> {value}</p>);
}

async function loadArticles() {
  const { data, error } = await supabase.from("articles").select("*").order("published_at", { ascending: false });
  if (error) { console.error(error); return []; }
  return data || [];
}
async function insertArticle(article) {
  const { error } = await supabase.from("articles").insert([article]);
  if (error) throw error;
}

function App() {
  const [articles, setArticles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(false);
  const [query, setQuery] = useState("");
  const [activeTab, setActiveTab] = useState("সব");
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [gateError, setGateError] = useState("");
  const [posting, setPosting] = useState(false);
  const [lastRef, setLastRef] = useState("");

  const refresh = useCallback(async () => {
    setLoading(true);
    setLoadError(false);
    try {
      const a = await loadArticles();
      setArticles(a);
    } catch (e) { setLoadError(true); }
    setLoading(false);
  }, []);
  useEffect(() => { refresh(); }, [refresh]);

  const sevenDaysAgo = Date.now() - 7 * 86400000;
  let visible = articles.filter((a) => {
    const q = query.trim().toLowerCase();
    return !q || a.title.toLowerCase().includes(q) || (a.position || "").toLowerCase().includes(q);
  });
  if (CATEGORIES.includes(activeTab)) visible = visible.filter((a) => a.category === activeTab && !isExpired(a.deadline));
  else if (activeTab === "নতুন") visible = visible.filter((a) => a.published_at >= sevenDaysAgo && !isExpired(a.deadline));
  else if (activeTab === "পুরাতন") visible = visible.filter((a) => isExpired(a.deadline));
  else if (activeTab === "ডেট") visible = visible.filter((a) => !isExpired(a.deadline)).sort((x, y) => new Date(x.deadline) - new Date(y.deadline));
  else visible = [...visible].sort((x, y) => {
    const xe = isExpired(x.deadline), ye = isExpired(y.deadline);
    if (xe !== ye) return xe ? 1 : -1;
    return y.published_at - x.published_at;
  });

  function closeModal() { setModal(null); setSelected(null); setGateError(""); }
  function handleGate(e) {
    e.preventDefault();
    const pass = e.target.password.value;
    if (pass === ADMIN_PASSWORD) { setIsAdmin(true); setModal("write"); setGateError(""); }
    else setGateError("পাসওয়ার্ড ভুল হয়েছে।");
  }
  function openWrite() { setModal(isAdmin ? "write" : "gate"); }

  async function handlePublish(e) {
    e.preventDefault();
    setPosting(true);
    const f = e.target;
    const refCode = genRefCode();
    const newArticle = {
      id: genId(), title: f.title.value.trim(), category: f.category.value, image_url: f.imageUrl.value.trim(),
      summary: f.summary.value.trim(), department: f.department.value.trim(), position: f.position.value.trim(),
      vacancies: f.vacancies.value.trim(), qualification: f.qualification.value.trim(), experience: f.experience.value.trim(),
      job_type: f.jobType.value.trim(), gender: f.gender.value.trim(), workplace: f.workplace.value.trim(),
      age_limit: f.ageLimit.value.trim(), location: f.location.value.trim(), salary: f.salary.value.trim(),
      benefits: f.benefits.value.trim(), apply_link: f.applyLink.value.trim(), deadline: f.deadline.value,
      source: f.source.value.trim(), ref_code: refCode, published_at: Date.now(),
    };
    try {
      await insertArticle(newArticle);
      await refresh();
      setLastRef(refCode);
      setModal("writeSuccess");
    } catch (err) { alert("প্রকাশ করতে সমস্যা হয়েছে। আবার চেষ্টা করো।"); console.error(err); }
    setPosting(false);
  }

  return (
    <div style={{ ...fontBody, background: paper, minHeight: "100vh", color: ink }}>
      <style>{`
        .btn-primary { background: ${green}; color: #fff; }
        .btn-primary:hover { background: ${greenDark}; }
        .btn-outline { border: 1.5px solid ${green}; color: ${green}; background: transparent; }
        .btn-outline:hover { background: ${green}; color: #fff; }
      `}</style>

      <header style={{ background: green }} className="px-5 py-5 sm:px-8 sm:py-6">
        <div className="max-w-5xl mx-auto flex items-center justify-between gap-4 flex-wrap">
          <div>
            <h1 style={{ ...fontDisplay, color: "#fff" }} className="text-2xl sm:text-3xl font-bold tracking-tight">চাকরির বাজার</h1>
            <p style={{ color: mustard }} className="text-sm mt-0.5">বাংলাদেশের চাকরির নোটিশবোর্ড</p>
          </div>
          <button onClick={openWrite} className="px-4 py-2 rounded-md text-sm font-semibold" style={{ background: mustard, color: greenDark }}>+ নতুন আর্টিকেল লিখুন</button>
        </div>
      </header>

      <nav className="tab-scroll max-w-5xl mx-auto px-5 sm:px-8 flex gap-2 overflow-x-auto py-3" style={{ background: "#FBF8EF", borderBottom: `1px solid ${ink}1a` }}>
        {MENU_TABS.map((t) => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} className="shrink-0 px-3.5 py-1.5 rounded-full text-sm font-semibold flex items-center gap-1.5"
            style={activeTab === t.id ? { background: green, color: "#fff" } : { background: `${ink}0d`, color: ink }}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
      </nav>

      <div className="max-w-5xl mx-auto px-5 sm:px-8 pt-5 pb-2">
        <input style={inputStyle} placeholder="পদ বা শিরোনাম দিয়ে খুঁজুন..." value={query} onChange={(e) => setQuery(e.target.value)} />
      </div>

      <main className="board-bg max-w-5xl mx-auto px-5 sm:px-8 py-8 min-h-[50vh]">
        {loading ? (
          <p className="text-center py-16 opacity-60">লোড হচ্ছে...</p>
        ) : loadError ? (
          <p className="text-center py-16" style={{ color: red }}>ডেটাবেস থেকে লোড করতে সমস্যা হচ্ছে। কিছুক্ষণ পর আবার চেষ্টা করো।</p>
        ) : visible.length === 0 ? (
          <div className="text-center py-16">
            <p style={fontDisplay} className="text-xl mb-2">এই তালিকায় কিছু পাওয়া যায়নি</p>
            <p className="opacity-70 text-sm mb-5">অন্য ট্যাব দেখো, অথবা প্রথম আর্টিকেলটি নিজেই লেখো।</p>
            <button onClick={openWrite} className="btn-primary px-5 py-2.5 rounded-md text-sm font-semibold">+ নতুন আর্টিকেল লিখুন</button>
          </div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-7 pt-2">
            {visible.map((a, i) => {
              const expired = isExpired(a.deadline);
              const dLeft = daysLeft(a.deadline);
              return (
                <div key={a.id} className="job-card relative rounded-sm p-5 pt-7 cursor-pointer overflow-hidden"
                  style={{ background: "#FBF8EF", transform: `rotate(${ROTATIONS[i % ROTATIONS.length]}deg)`, boxShadow: "0 4px 10px rgba(0,0,0,0.12)", border: `1px dashed ${ink}22`, opacity: expired ? 0.55 : 1 }}
                  onClick={() => { setSelected(a); setModal("detail"); }}>
                  <span className="absolute rounded-full" style={{ top: -8, left: "50%", marginLeft: -7, width: 14, height: 14, background: `radial-gradient(circle at 35% 30%, #fff5, ${i % 2 ? red : mustard})`, boxShadow: "0 2px 3px rgba(0,0,0,0.35)" }} />
                  {expired ? (
                    <span className="absolute top-2 right-2 text-[10px] px-2 py-0.5 rounded" style={{ background: `${ink}22`, color: ink }}>মেয়াদ শেষ</span>
                  ) : dLeft !== null && dLeft <= 3 ? (
                    <span className="absolute top-2 right-2 text-[10px] px-2 py-0.5 rounded font-semibold" style={{ background: `${red}22`, color: red }}>{dLeft <= 0 ? "আজই শেষ দিন" : `আর ${toBn(dLeft)} দিন বাকি`}</span>
                  ) : null}
                  {a.image_url && <img src={a.image_url} alt="" className="w-full h-28 object-cover rounded mb-3" style={{ border: `1px solid ${ink}22` }} onError={(e) => e.target.style.display = "none"} />}
                  <p style={{ ...fontMono, color: red }} className="text-[11px] mb-1.5">{a.ref_code}</p>
                  <h3 style={fontDisplay} className="text-lg font-bold leading-snug mb-1">{a.title}</h3>
                  {a.summary && <p className="text-sm opacity-80 mb-3 line-clamp-2">{a.summary}</p>}
                  <div className="flex flex-wrap gap-1.5 mb-3">
                    <span className="text-xs px-2 py-0.5 rounded" style={{ background: `${green}1a`, color: green }}>{a.category}</span>
                  </div>
                  {a.salary && <p className="text-sm font-semibold mb-1" style={{ color: greenDark }}>{a.salary}</p>}
                  <p style={fontMono} className="text-xs opacity-60">শেষ তারিখ: {formatDateBn(a.deadline)}</p>
                </div>
              );
            })}
          </div>
        )}
      </main>

      {modal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "#00000066" }} onClick={closeModal}>
          <div onClick={(e) => e.stopPropagation()} className="modal-scroll relative w-full max-w-xl max-h-[90vh] overflow-y-auto rounded-lg p-6 sm:p-8" style={{ background: paper, boxShadow: "0 20px 50px rgba(0,0,0,0.35)" }}>
            <button onClick={closeModal} className="absolute top-4 right-4 text-xl opacity-60 hover:opacity-100" aria-label="বন্ধ করুন">✕</button>

            {modal === "detail" && selected && (
              <article>
                <p style={{ ...fontMono, color: red }} className="text-xs mb-2">{selected.ref_code}</p>
                <h2 style={fontDisplay} className="text-2xl font-bold mb-2 pr-6 leading-snug">{selected.title}</h2>
                <p className="text-xs opacity-60 mb-4">প্রকাশ: {formatDateBn(new Date(selected.published_at).toISOString().slice(0,10))}</p>
                {selected.image_url && <img src={selected.image_url} alt="" className="w-full h-48 object-cover rounded mb-4" style={{ border: `1px solid ${ink}22` }} onError={(e) => e.target.style.display = "none"} />}
                {selected.summary && <p className="text-sm mb-5 leading-relaxed opacity-90 whitespace-pre-wrap">{selected.summary}</p>}
                <div className="rounded-md p-4 mb-5" style={{ background: "#FBF8EF", border: `1px solid ${ink}1a` }}>
                  <InfoRow label="বিভাগ" value={selected.department} />
                  <InfoRow label="পদের নাম" value={selected.position} />
                  <InfoRow label="পদসংখ্যা" value={selected.vacancies} />
                  <InfoRow label="শিক্ষাগত যোগ্যতা" value={selected.qualification} />
                  <InfoRow label="অভিজ্ঞতা" value={selected.experience} />
                  <InfoRow label="চাকরির ধরন" value={selected.job_type} />
                  <InfoRow label="প্রার্থীর ধরন" value={selected.gender} />
                  <InfoRow label="কর্মক্ষেত্র" value={selected.workplace} />
                  <InfoRow label="বয়সসীমা" value={selected.age_limit} />
                  <InfoRow label="কর্মস্থল" value={selected.location} />
                  <InfoRow label="বেতন" value={selected.salary} />
                  <InfoRow label="অন্যান্য সুবিধা" value={selected.benefits} />
                </div>
                <p className="text-xs opacity-60 mb-1" style={fontMono}>আবেদনের শেষ সময়: {formatDateBn(selected.deadline)}</p>
                {selected.source && <p className="text-xs opacity-60 mb-4">সূত্র: {selected.source}</p>}
                {isExpired(selected.deadline) ? (
                  <p className="text-sm py-3 text-center rounded" style={{ background: `${ink}11` }}>আবেদনের মেয়াদ শেষ হয়ে গেছে</p>
                ) : selected.apply_link ? (
                  <a href={selected.apply_link} target="_blank" rel="noopener noreferrer" className="btn-primary block text-center w-full py-2.5 rounded-md font-semibold">আবেদন করুন / বিস্তারিত দেখুন</a>
                ) : null}
              </article>
            )}

            {modal === "gate" && (
              <form onSubmit={handleGate}>
                <h2 style={fontDisplay} className="text-xl font-bold mb-5 pr-6">অ্যাডমিন যাচাই</h2>
                <Field label="পাসওয়ার্ড" required><input required name="password" type="password" style={inputStyle} placeholder="আর্টিকেল লেখার পাসওয়ার্ড" /></Field>
                {gateError && <p className="text-sm mb-3" style={{ color: red }}>{gateError}</p>}
                <button className="btn-primary w-full py-2.5 rounded-md font-semibold">প্রবেশ করুন</button>
              </form>
            )}

            {modal === "write" && (
              <form onSubmit={handlePublish}>
                <h2 style={fontDisplay} className="text-xl font-bold mb-5 pr-6">নতুন আর্টিকেল লিখুন</h2>
                <Field label="শিরোনাম" required><input required name="title" style={inputStyle} placeholder="যেমন: কর্মী নেবে XYZ লিমিটেড" /></Field>
                <Field label="ক্যাটাগরি" required><select required name="category" style={inputStyle}>{CATEGORIES.map((c) => <option key={c}>{c}</option>)}</select></Field>
                <Field label="ছবির লিংক (ঐচ্ছিক)"><input name="imageUrl" style={inputStyle} placeholder="https://..." /></Field>
                <Field label="সংক্ষিপ্ত বিবরণ (ভূমিকা অনুচ্ছেদ)"><textarea name="summary" rows="3" style={inputStyle} placeholder="প্রতিষ্ঠান সম্পর্কে সংক্ষেপে লিখুন..."></textarea></Field>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="বিভাগ"><input name="department" style={inputStyle} /></Field>
                  <Field label="পদের নাম"><input name="position" style={inputStyle} /></Field>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="পদসংখ্যা"><input name="vacancies" style={inputStyle} /></Field>
                  <Field label="অভিজ্ঞতা"><input name="experience" style={inputStyle} /></Field>
                </div>
                <Field label="শিক্ষাগত যোগ্যতা"><input name="qualification" style={inputStyle} /></Field>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="চাকরির ধরন"><input name="jobType" style={inputStyle} placeholder="ফুলটাইম/পার্টটাইম" /></Field>
                  <Field label="প্রার্থীর ধরন"><input name="gender" style={inputStyle} placeholder="নারী-পুরুষ" /></Field>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="কর্মক্ষেত্র"><input name="workplace" style={inputStyle} placeholder="অফিসে/রিমোট" /></Field>
                  <Field label="বয়সসীমা"><input name="ageLimit" style={inputStyle} placeholder="উল্লেখ নেই" /></Field>
                </div>
                <Field label="কর্মস্থল"><input name="location" style={inputStyle} placeholder="ঢাকা" /></Field>
                <Field label="বেতন"><input name="salary" style={inputStyle} placeholder="আলোচনা সাপেক্ষে" /></Field>
                <Field label="অন্যান্য সুবিধা"><textarea name="benefits" rows="2" style={inputStyle}></textarea></Field>
                <Field label="আবেদনের লিংক" required><input required name="applyLink" style={inputStyle} placeholder="https://bdjobs.com/..." /></Field>
                <Field label="আবেদনের শেষ তারিখ" required><input required name="deadline" type="date" style={inputStyle} /></Field>
                <Field label="সূত্র (ঐচ্ছিক)"><input name="source" style={inputStyle} placeholder="বিডিজবস ডটকম" /></Field>
                <button disabled={posting} className="btn-primary w-full py-2.5 rounded-md font-semibold mt-2 disabled:opacity-60">{posting ? "প্রকাশ হচ্ছে..." : "প্রকাশ করুন"}</button>
              </form>
            )}

            {modal === "writeSuccess" && (
              <div className="text-center py-2">
                <p className="text-4xl mb-3">📰</p>
                <h2 style={fontDisplay} className="text-xl font-bold mb-2">আর্টিকেল প্রকাশিত হয়েছে!</h2>
                <p style={fontMono} className="text-sm mb-6">{lastRef}</p>
                <button onClick={closeModal} className="btn-primary px-5 py-2 rounded-md font-semibold">ঠিক আছে</button>
              </div>
            )}
          </div>
        </div>
      )}

      <footer className="text-center text-xs opacity-50 py-6">চাকরির বাজার — একটি স্বাধীন চাকরির নোটিশবোর্ড</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
